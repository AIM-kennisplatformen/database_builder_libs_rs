services:
  typedb:
    image: typedb/typedb:3.11.5
    container_name: kp-typedb
    ports:
      - "1729:1729"
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - kp-typedb:/opt/typedb-all-linux/server/data

  qdrant:
    image: qdrant/qdrant:v1.18
    container_name: kp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped
    volumes:
      - kp-qdrant:/qdrant/storage
    
  grobid:
    image: grobid/grobid:0.9.0-crf
    container_name: kp-grobid
    ports:
      - "8070:8070"
    restart: unless-stopped

volumes:
  kp-typedb:
  kp-qdrant:
