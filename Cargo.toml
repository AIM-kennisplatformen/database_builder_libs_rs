[package]
name = "database-builder-scepa-rs"
version = "0.2.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
clap = { version = "4.6.1", features = ["derive", "env"] }
derive_more = { version = "2.1.1", features = ["full"] }
dotenvy = "0.15.7"
futures-util = "0.3.31"
qdrant-client = "1.18.0"
quick-xml = { version = "0.39.4", features = ["serialize"] }
reqwest = { version = "0.13.4", features = ["multipart"] }
rustls = { version = "0.23.41", default-features = false, features = ["ring"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread", "time"] }
typedb-driver = "3.10.0"
uuid = { version = "1.18.1", features = ["v5"] }
