[package]
name = "scepa-rs"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cli"
path = "src/bin/cli.rs"

[dependencies]
anyhow = "1.0.103"
clap = { version = "4.6.1", features = ["derive", "env"] }
dotenvy = "0.15.7"
indicatif = "0.18.3"
reqwest = { version = "0.13.4", features = ["multipart"] }
thiserror = "2.0.18"
tokio = { version = "1.45.1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["ansi", "env-filter", "fmt"] }
